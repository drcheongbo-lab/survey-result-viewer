<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설문 검사</title>

<style>
body {
  font-family: "Apple SD Gothic Neo", Arial, sans-serif;
  background: #f8fafc;
  color: #1f2937;
  margin: 0;
}

.container {
  max-width: 980px;
  width: 95%;
  margin: 16px auto;
  background: #ffffff;
  padding: 20px 24px;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  margin-bottom: 24px;
}

.step {
  margin-bottom: 60px;
}

.step h3 {
  margin-bottom: 10px;
}

.guide {
  background: #f1f5f9;
  padding: 16px 20px;
  border-radius: 6px;
  font-size: 15.5px;
  line-height: 1.6;
  margin-bottom: 14px;
  color: #334155;
}

iframe {
  width: 100%;
  height: 1400px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
}

.notice {
  margin-top: 12px;
  font-size: 14.5px;
  color: #64748b;
}

/* 결과 영역 */
.result-box {
  display: none;
  margin-top: 24px;
  padding: 24px;
  background: #f8fafc;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
}

.result-card {
  background: #ffffff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.result-card h4 {
  margin-bottom: 8px;
  color: #0f172a;
}

button {
  padding: 14px 22px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  background: #2563eb;
  color: #ffffff;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.loading {
  font-size: 15px;
  color: #475569;
  margin-top: 12px;
}

/* 모바일 */
@media (max-width: 768px) {

  .container {
    padding: 14px 14px;
    margin: 8px auto;
  }

  h1 {
    font-size: 26px;
  }

  .step h3 {
    font-size: 20px;
  }

  .guide {
    font-size: 17px;
    line-height: 1.6;
    padding: 12px 14px;
  }

  .notice {
    font-size: 16px;
  }

  .result-card p {
    font-size: 17px;
  }

  input[type="text"] {
    font-size: 18px;
    padding: 12px;
    width: 100%;
  }

  button {
    font-size: 18px;
    padding: 14px 18px;
    width: 100%;
  }

  iframe {
    height: 1800px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>심리 · 증상 검사</h1>

  <!-- STEP 1 -->
  <div class="step">
    <h3>① 증상 설문</h3>
    <div class="guide">
      현재 몸의 상태를 파악하기 위한 설문입니다.<br>
      정답은 없으며 약 3~5분 정도 소요됩니다.
    </div>

    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSdAHOgM2fYvcFpMp0Ryx7jF_aa2ACNAVxWUwj4l8-c5c0wCoQ/viewform?embedded=true">
    </iframe>

    <div class="notice">
      설문 제출 후 아래 심리 설문으로 이동해 주세요.
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="step">
    <h3>② 심리 설문</h3>
    <div class="guide">
      현재 심리 상태와 스트레스 반응을 확인하는 검사입니다.
    </div>

    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSdino89hjtQN9_2QMKzirdguHN6-pSCNUhQ6nKDUHou5lqqGw/viewform?embedded=true">
    </iframe>

    <div class="notice">
      모든 설문이 완료되면 아래에서 결과를 확인할 수 있습니다.
    </div>
  </div>
  <!-- 결과 조회 영역 -->
<div class="result-box" id="resultBox">
  <div class="result-card">
    <h4>검사 결과 안내</h4>
    <p>
      설문 제출이 완료되면 상담 시 결과를 안내해드립니다.<br>
      문의가 필요하시면 병원으로 연락 주세요.
    </p>
  </div>
</div>

</div>

</body>
</html>
