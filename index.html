<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심리 · 증상 검사</title>

<style>
body {
  font-family: "Apple SD Gothic Neo", Arial, sans-serif;
  background: #f8fafc;
  color: #1f2937;
  margin: 0;
}

.container {
  max-width: 980px;
  width: 95%;
  margin: 16px auto;
  background: #ffffff;
  padding: 20px 24px;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  margin-bottom: 24px;
}

.step {
  margin-bottom: 60px;
}

.step h3 {
  margin-bottom: 10px;
}

.guide {
  background: #f1f5f9;
  padding: 16px 20px;
  border-radius: 6px;
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 14px;
  color: #334155;
}

.notice {
  margin-top: 12px;
  font-size: 15px;
  color: #64748b;
}

/* ===== 구글폼 확대 ===== */
.form-wrapper {
  overflow: hidden;
}

.form-wrapper iframe {
  width: 120%;
  height: 1700px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;

  transform: scale(1.2);
  transform-origin: top left;
}

/* 입력 & 버튼 */
input[type="text"] {
  padding: 12px;
  font-size: 16px;
  width: 240px;
}

button {
  padding: 14px 22px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  background: #2563eb;
  color: #ffffff;
}

.loading {
  font-size: 15px;
  color: #475569;
  margin-top: 12px;
}

/* ===== 모바일 최적화 ===== */
@media (max-width: 768px) {

  .container {
    padding: 14px;
  }

  h1 {
    font-size: 26px;
  }

  .step h3 {
    font-size: 20px;
  }

  .guide {
    font-size: 18px;
  }

  input[type="text"] {
    width: 100%;
    font-size: 18px;
  }

  button {
    width: 100%;
    font-size: 18px;
  }

  /* 모바일에서는 더 크게 확대 */
  .form-wrapper iframe {
    transform: scale(1.35);
    width: 135%;
    height: 2000px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>심리 · 증상 검사</h1>

  <!-- STEP 1 -->
  <div class="step">
    <h3>① 증상 설문</h3>
    <div class="guide">
      현재 몸의 상태를 파악하기 위한 설문입니다.<br>
      정답은 없으며 약 3~5분 정도 소요됩니다.
    </div>

    <div class="form-wrapper">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSdAHOgM2fYvcFpMp0Ryx7jF_aa2ACNAVxWUwj4l8-c5c0wCoQ/viewform?embedded=true">
      </iframe>
    </div>

    <div class="notice">설문 제출 후 아래 심리 설문으로 이동해 주세요.</div>
  </div>

  <!-- STEP 2 -->
  <div class="step">
    <h3>② 심리 설문</h3>
    <div class="guide">
      현재 심리 상태와 스트레스 반응을 확인하는 검사입니다.
    </div>

    <div class="form-wrapper">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSdino89hjtQN9_2QMKzirdguHN6-pSCNUhQ6nKDUHou5lqqGw/viewform?embedded=true">
      </iframe>
    </div>

    <div class="notice">모든 설문이 완료되면 아래에서 결과를 확인할 수 있습니다.</div>
  </div>

  <!-- STEP 3 -->
  <div class="step">
    <h3>③ 검사 결과 확인</h3>

    <div class="guide">
      검사 결과는 <b>이름 기준</b>으로 저장됩니다.<br>
      이전에 검사한 경우에도 같은 이름으로 조회할 수 있습니다.
    </div>

    <input
      type="text"
      id="resultName"
      placeholder="이름 입력">

    <br><br>

    <button onclick="alert('결과 연동은 기존 loadResult() 스크립트를 유지하세요.')">
      결과 확인하기
    </button>

    <div class="loading">
      ※ 기존 loadResult() 스크립트는 그대로 사용하시면 됩니다.
    </div>
  </div>

</div>

</body>
</html>
